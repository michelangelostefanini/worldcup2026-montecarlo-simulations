<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 680" role="img" aria-labelledby="title description">
  <title id="title">World Cup 2026 simulation model structure</title>
  <desc id="description">Historical results and group-stage data produce combined team strengths, which feed a Poisson match model and Monte Carlo tournament simulation.</desc>
  <style>
    :root {
      color-scheme: light dark;
    }
    .background { fill: #ffffff; }
    .box { fill: #f6f8fa; stroke: #57606a; stroke-width: 2; }
    .source { fill: #ddf4ff; stroke: #0969da; }
    .model { fill: #fff8c5; stroke: #9a6700; }
    .result { fill: #dafbe1; stroke: #1a7f37; }
    .label {
      fill: #1f2328;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 17px;
      font-weight: 600;
      text-anchor: middle;
    }
    .sub {
      font-size: 14px;
      font-weight: 400;
    }
    .arrow {
      fill: none;
      stroke: #57606a;
      stroke-width: 2.5;
      marker-end: url(#arrowhead);
    }
    @media (prefers-color-scheme: dark) {
      .background { fill: #0d1117; }
      .box { fill: #161b22; stroke: #8b949e; }
      .source { fill: #0c2d4a; stroke: #58a6ff; }
      .model { fill: #3b2e00; stroke: #d29922; }
      .result { fill: #123820; stroke: #3fb950; }
      .label { fill: #f0f6fc; }
      .arrow { stroke: #8b949e; }
    }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b949e"/>
    </marker>
  </defs>

  <rect class="background" width="900" height="680" rx="18"/>

  <!-- Data sources -->
  <rect class="box source" x="70" y="45" width="230" height="75" rx="12"/>
  <text class="label" x="185" y="76">
    <tspan x="185">Historical results</tspan>
    <tspan class="sub" x="185" dy="23">1990–2026</tspan>
  </text>

  <rect class="box source" x="600" y="45" width="230" height="75" rx="12"/>
  <text class="label" x="715" y="76">
    <tspan x="715">2026 group stage</tspan>
    <tspan class="sub" x="715" dy="23">72 matches</tspan>
  </text>

  <!-- Rating and form -->
  <rect class="box" x="70" y="180" width="230" height="70" rx="12"/>
  <text class="label" x="185" y="221">Chronological Elo</text>

  <rect class="box" x="335" y="180" width="230" height="70" rx="12"/>
  <text class="label" x="450" y="207">
    <tspan x="450">Post-group</tspan>
    <tspan x="450" dy="23">Elo update</tspan>
  </text>

  <rect class="box" x="600" y="180" width="230" height="70" rx="12"/>
  <text class="label" x="715" y="221">Group form</text>

  <path class="arrow" d="M185 120 V180"/>
  <path class="arrow" d="M300 215 H335"/>
  <path class="arrow" d="M600 83 H520 Q500 83 500 103 V180"/>
  <path class="arrow" d="M715 120 V180"/>

  <!-- Combined strength -->
  <rect class="box model" x="300" y="310" width="300" height="82" rx="12"/>
  <text class="label" x="450" y="341">
    <tspan x="450">Combined strength</tspan>
    <tspan class="sub" x="450" dy="25">70% Elo · 30% group form</tspan>
  </text>

  <path class="arrow" d="M450 250 V310"/>
  <path class="arrow" d="M715 250 V275 Q715 290 695 290 H520 Q500 290 500 310"/>

  <!-- Match and tournament simulation -->
  <rect class="box model" x="120" y="455" width="250" height="75" rx="12"/>
  <text class="label" x="245" y="485">
    <tspan x="245">Poisson match model</tspan>
    <tspan class="sub" x="245" dy="23">Goals · extra time · penalties</tspan>
  </text>

  <rect class="box source" x="530" y="455" width="250" height="75" rx="12"/>
  <text class="label" x="655" y="485">
    <tspan x="655">Knockout bracket</tspan>
    <tspan class="sub" x="655" dy="23">31 matches</tspan>
  </text>

  <path class="arrow" d="M400 392 Q400 425 330 455"/>

  <rect class="box model" x="300" y="575" width="300" height="70" rx="12"/>
  <text class="label" x="450" y="602">
    <tspan x="450">Monte Carlo simulation</tspan>
    <tspan class="sub" x="450" dy="23">1,000,000 tournaments · seed 2026</tspan>
  </text>

  <path class="arrow" d="M245 530 V550 Q245 565 265 565 H350 Q370 565 370 575"/>
  <path class="arrow" d="M655 530 V550 Q655 565 635 565 H550 Q530 565 530 575"/>

  <!-- Output -->
  <rect class="box result" x="665" y="585" width="190" height="60" rx="12"/>
  <text class="label" x="760" y="608">
    <tspan x="760">Stage &amp; title</tspan>
    <tspan class="sub" x="760" dy="21">probabilities</tspan>
  </text>
  <path class="arrow" d="M600 610 H665"/>
</svg>
